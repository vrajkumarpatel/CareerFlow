services:
  - type: web
    name: careerflow-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python -u manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://careerflow-frontend.vercel.app"   # update after Vercel deploy
      # ── Supabase PostgreSQL — set these in the Render dashboard ──────────
      - key: DATABASE_HOST
        sync: false   # e.g. db.xxxxxxxxxxxx.supabase.co
      - key: DATABASE_NAME
        value: "postgres"
      - key: DATABASE_USER
        value: "postgres"
      - key: DATABASE_PASSWORD
        sync: false   # your Supabase DB password
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_SSLMODE
        value: "require"
      # ── AI features ───────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
