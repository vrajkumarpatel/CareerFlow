<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CareerFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style_sheet.css" rel="stylesheet">
</head>
<body>

    <header class="p-4 text-center">
        <h1 class="title-main">CareerFlow</h1>
    </header>

    <nav class="d-flex justify-content-between align-items-center px-4 py-2 bg-light border-bottom">
        <div class="nav-links">
            <a href="Career_Flow.html" class="me-3 text-decoration-none">Home</a>
            <a href="videos.html" class="me-3 text-decoration-none">Videos</a>
            <a href="maps.html" class="me-3 text-decoration-none">Maps</a>
            <a href="about.html" class="me-3 text-decoration-none">About</a>
            <a href="contact.html" class="me-3 text-decoration-none">Contact</a>
        </div>
        
        <div class="auth-buttons">
            <button type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">
                Login
            </button>
        </div>
    </nav>

    <main class="container text-center my-5">
        <section class="my-5 p-4 border rounded shadow-sm" style="max-width: 500px; margin: 0 auto;">
            <h3>Subscribe for Updates</h3>
            <p>Enter your email and click Subscribe:</p>
            <div class="mb-3">
                <input id="emailInput" type="email" class="form-control" placeholder="name@example.com">
            </div>
            <button id="subscribeBtn" class="btn btn-primary w-100">Subscribe</button>
            <p id="message" class="mt-3" style="display: none; font-weight: bold;"></p>
        </section>
    </main>

    <footer class="text-center py-4">
        © 2026 CareerFlow. All Rights Reserved.
    </footer>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Login to Career Flow</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-start">
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" id="loginEmail" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // --- Subscription Logic ---
        document.getElementById("subscribeBtn").addEventListener("click", function() {
            const email = document.getElementById("emailInput").value.trim();
            const message = document.getElementById("message");

            if (email === "") {
                message.style.display = "block";
                message.style.color = "red";
                message.textContent = "Please enter an email address.";
            } else if (email.includes("@") && email.length > 5) {
                message.style.display = "block";
                message.style.color = "green";
                message.textContent = "Thank you for subscribing!";
                document.getElementById("emailInput").value = "";
            } else {
                message.style.display = "block";
                message.style.color = "red";
                message.textContent = "Please enter a valid email.";
            }
        });

        // --- Login Logic (To stop the page from refreshing) ---
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault(); // This stops the page from refreshing!
            const userEmail = document.getElementById("loginEmail").value;
            alert("Welcome back, " + userEmail + "!");
            // Here you would normally close the modal
        });
    </script>
</body>
</html>
